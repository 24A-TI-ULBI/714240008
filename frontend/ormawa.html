<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Ormawa - SIAKAD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      background: #f4f6f8;
      color: #243044;
    }
    header {
      background: #1769aa;
      color: #fff;
      padding: 1rem 1.5rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 650; }
    header p { margin-top: 0.2rem; font-size: 0.84rem; opacity: 0.9; }
    main {
      width: min(1120px, calc(100% - 2rem));
      margin: 1.5rem auto 2.5rem;
      display: grid;
      gap: 1.25rem;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .toolbar h2 { font-size: 1.35rem; }
    .status {
      min-height: 2rem;
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      padding: 0.45rem 0.75rem;
      font-size: 0.84rem;
      background: #e7f1fb;
      color: #155d93;
    }
    .status.error { background: #fdecea; color: #b3261e; }
    .status.success { background: #e8f5e9; color: #1b6e20; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 1.25rem;
      align-items: start;
    }
    .stack { display: grid; gap: 1.25rem; }
    section, aside {
      background: #fff;
      border: 1px solid #d8e0ea;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 1px 3px rgba(36, 48, 68, 0.06);
    }
    section h3, aside h3 {
      margin-bottom: 0.9rem;
      font-size: 1rem;
      color: #1d2b3f;
    }
    .list {
      display: grid;
      gap: 0.8rem;
    }
    .item {
      border: 1px solid #e1e7ef;
      border-radius: 7px;
      padding: 0.9rem;
      background: #fbfcfe;
    }
    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .item h4 {
      font-size: 0.98rem;
      line-height: 1.25;
      color: #1769aa;
    }
    .badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 0.18rem 0.55rem;
      background: #eef3f8;
      color: #4a5c73;
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .item p {
      margin-top: 0.35rem;
      color: #526174;
      font-size: 0.86rem;
      line-height: 1.45;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.65rem;
      color: #526174;
      font-size: 0.8rem;
    }
    .empty {
      border: 1px dashed #bec9d7;
      border-radius: 7px;
      padding: 1rem;
      color: #64748b;
      font-size: 0.86rem;
      text-align: center;
      background: #fbfcfe;
    }
    form { display: grid; gap: 0.8rem; }
    label {
      display: grid;
      gap: 0.35rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: #34445a;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 0.65rem 0.7rem;
      font: inherit;
      color: #243044;
      background: #fff;
    }
    textarea { min-height: 86px; resize: vertical; }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid rgba(23, 105, 170, 0.22);
      border-color: #1769aa;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 0.7rem 0.9rem;
      font: inherit;
      font-weight: 650;
      color: #fff;
      background: #1769aa;
      cursor: pointer;
    }
    button:hover { background: #125a92; }
    button:disabled {
      cursor: not-allowed;
      background: #8aa9c2;
    }
    .forms { display: grid; gap: 1.25rem; }
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      main { width: min(100% - 1rem, 720px); }
    }
  </style>
</head>
<body>
  <header>
    <h1>SIAKAD</h1>
    <p>Modul Ormawa & Kegiatan</p>
  </header>

  <main>
    <div class="toolbar">
      <h2>Data Ormawa</h2>
      <div id="status" class="status">Memuat data...</div>
    </div>

    <div class="layout">
      <div class="stack">
        <section>
          <h3>Daftar Ormawa</h3>
          <div id="ormawa-list" class="list"></div>
        </section>

        <section>
          <h3>Daftar Kegiatan</h3>
          <div id="kegiatan-list" class="list"></div>
        </section>
      </div>

      <aside class="forms">
        <section>
          <h3>Tambah Ormawa</h3>
          <form id="ormawa-form">
            <label>
              Nama Ormawa
              <input id="ormawa-nama" name="nama" type="text" required>
            </label>
            <label>
              Deskripsi
              <textarea id="ormawa-deskripsi" name="deskripsi" required></textarea>
            </label>
            <label>
              Ketua
              <input id="ormawa-ketua" name="ketua" type="text" required>
            </label>
            <label>
              Pengurus
              <textarea id="ormawa-pengurus" name="pengurus" placeholder="Pisahkan nama dengan koma" required></textarea>
            </label>
            <button type="submit">Simpan Ormawa</button>
          </form>
        </section>

        <section>
          <h3>Tambah Kegiatan</h3>
          <form id="kegiatan-form">
            <label>
              Ormawa
              <select id="kegiatan-ormawa" name="ormawa_id" required>
                <option value="">Pilih ormawa</option>
              </select>
            </label>
            <label>
              Nama Kegiatan
              <input id="kegiatan-nama" name="nama" type="text" required>
            </label>
            <label>
              Deskripsi
              <textarea id="kegiatan-deskripsi" name="deskripsi" required></textarea>
            </label>
            <label>
              Tanggal
              <input id="kegiatan-tanggal" name="tanggal" type="date" required>
            </label>
            <label>
              Lokasi
              <input id="kegiatan-lokasi" name="lokasi" type="text" required>
            </label>
            <button type="submit">Simpan Kegiatan</button>
          </form>
        </section>
      </aside>
    </div>
  </main>

  <script>
    const state = {
      ormawa: [],
      kegiatan: []
    };

    const statusEl = document.getElementById('status');
    const ormawaListEl = document.getElementById('ormawa-list');
    const kegiatanListEl = document.getElementById('kegiatan-list');
    const kegiatanOrmawaEl = document.getElementById('kegiatan-ormawa');
    const ormawaForm = document.getElementById('ormawa-form');
    const kegiatanForm = document.getElementById('kegiatan-form');

    function setStatus(message, type = '') {
      statusEl.textContent = message;
      statusEl.className = type ? `status ${type}` : 'status';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getID(item) {
      if (!item || !item._id) return '';
      if (typeof item._id === 'string') return item._id;
      return item._id.$oid || '';
    }

    function getOrmawaName(id) {
      const found = state.ormawa.find((item) => getID(item) === id);
      return found ? found.nama : id;
    }

    async function requestJSON(url, options = {}) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      const payload = await response.json();
      if (!response.ok || payload.status === 'error') {
        throw new Error(payload.message || 'Request gagal');
      }
      return payload.data;
    }

    function renderOrmawa() {
      if (!state.ormawa.length) {
        ormawaListEl.innerHTML = '<div class="empty">Belum ada data ormawa.</div>';
        return;
      }

      ormawaListEl.innerHTML = state.ormawa.map((item) => {
        const pengurus = Array.isArray(item.pengurus) ? item.pengurus.join(', ') : '-';
        return `
          <article class="item">
            <div class="item-head">
              <h4>${escapeHtml(item.nama)}</h4>
              <span class="badge">${escapeHtml(item.ketua || '-')}</span>
            </div>
            <p>${escapeHtml(item.deskripsi || '-')}</p>
            <div class="meta"><span>Pengurus: ${escapeHtml(pengurus)}</span></div>
          </article>
        `;
      }).join('');
    }

    function renderKegiatan() {
      if (!state.kegiatan.length) {
        kegiatanListEl.innerHTML = '<div class="empty">Belum ada data kegiatan.</div>';
        return;
      }

      kegiatanListEl.innerHTML = state.kegiatan.map((item) => {
        const ormawaID = getID({ _id: item.ormawa_id });
        return `
          <article class="item">
            <div class="item-head">
              <h4>${escapeHtml(item.nama)}</h4>
              <span class="badge">${escapeHtml(item.tanggal || '-')}</span>
            </div>
            <p>${escapeHtml(item.deskripsi || '-')}</p>
            <div class="meta">
              <span>Ormawa: ${escapeHtml(getOrmawaName(ormawaID))}</span>
              <span>Lokasi: ${escapeHtml(item.lokasi || '-')}</span>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderOrmawaOptions() {
      const currentValue = kegiatanOrmawaEl.value;
      kegiatanOrmawaEl.innerHTML = '<option value="">Pilih ormawa</option>';
      state.ormawa.forEach((item) => {
        const option = document.createElement('option');
        option.value = getID(item);
        option.textContent = item.nama;
        kegiatanOrmawaEl.appendChild(option);
      });
      kegiatanOrmawaEl.value = currentValue;
    }

    async function fetchOrmawa() {
      state.ormawa = await requestJSON('/ormawa') || [];
      renderOrmawa();
      renderOrmawaOptions();
    }

    async function fetchKegiatan() {
      state.kegiatan = await requestJSON('/kegiatan') || [];
      renderKegiatan();
    }

    async function loadData() {
      setStatus('Memuat data...');
      try {
        await fetchOrmawa();
        await fetchKegiatan();
        setStatus('Data siap digunakan', 'success');
      } catch (error) {
        setStatus(error.message, 'error');
      }
    }

    ormawaForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = ormawaForm.querySelector('button');
      button.disabled = true;
      setStatus('Menyimpan ormawa...');
      try {
        const pengurus = document.getElementById('ormawa-pengurus').value
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean);
        await requestJSON('/ormawa', {
          method: 'POST',
          body: JSON.stringify({
            nama: document.getElementById('ormawa-nama').value.trim(),
            deskripsi: document.getElementById('ormawa-deskripsi').value.trim(),
            ketua: document.getElementById('ormawa-ketua').value.trim(),
            pengurus
          })
        });
        ormawaForm.reset();
        await loadData();
        setStatus('Ormawa berhasil disimpan', 'success');
      } catch (error) {
        setStatus(error.message, 'error');
      } finally {
        button.disabled = false;
      }
    });

    kegiatanForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = kegiatanForm.querySelector('button');
      button.disabled = true;
      setStatus('Menyimpan kegiatan...');
      try {
        await requestJSON('/kegiatan', {
          method: 'POST',
          body: JSON.stringify({
            ormawa_id: document.getElementById('kegiatan-ormawa').value,
            nama: document.getElementById('kegiatan-nama').value.trim(),
            deskripsi: document.getElementById('kegiatan-deskripsi').value.trim(),
            tanggal: document.getElementById('kegiatan-tanggal').value,
            lokasi: document.getElementById('kegiatan-lokasi').value.trim()
          })
        });
        kegiatanForm.reset();
        await loadData();
        setStatus('Kegiatan berhasil disimpan', 'success');
      } catch (error) {
        setStatus(error.message, 'error');
      } finally {
        button.disabled = false;
      }
    });

    loadData();
  </script>
</body>
</html>
